<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Soluciones Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-x-hidden">

    <header class="py-8 px-4 text-center bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-blue-600 font-bold hover:underline">← Volver al inicio</a>
            <h1 class="text-xl font-bold">Área de Contacto</h1>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10 sm:py-16">
        
        <section data-aos="fade-up" class="text-center mb-16">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-6">Contacto</h1>
            <p class="text-lg text-gray-600">Estamos a disposición para colaborar en tu próximo proyecto.</p>
        </section>

<section class="grid grid-cols-1 sm:grid-cols-3 gap-6">
    <div data-aos="fade-up" data-aos-delay="100" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:shadow-md transition-shadow">
        <h3 class="font-bold text-lg mb-4">Correo Electronico</h3>
        <a href="mailto:contacto@solucionessoftware.com.uy" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
            Enviar correo
        </a>
    </div>

    <div data-aos="fade-up" data-aos-delay="200" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:shadow-md transition-shadow">
        <h3 class="font-bold text-lg mb-4">Teléfono</h3>
        <a href="tel:+598XXXXXXXXX" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
            Llamar ahora
        </a>
    </div>

    <div data-aos="fade-up" data-aos-delay="300" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center hover:shadow-md transition-shadow">
        <h3 class="font-bold text-lg mb-4">WhatsApp</h3>
        <a href="https://wa.me/XXXXXXXXX" target="_blank" class="inline-block bg-green-600 text-white px-6 py-2 rounded-full hover:bg-green-700 transition shadow-lg hover:shadow-green-200">
            Enviar mensaje
        </a>
    </div>
</section>
    </main>

    <footer class="text-center py-12 text-gray-400 text-sm border-t">
        &copy; 2026 Soluciones Software. Todos los derechos reservados.
    </footer>

    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
